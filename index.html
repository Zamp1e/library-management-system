<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 图书管理系统</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
<style>
:root {
  --ink: #1a1a2e;
  --card: #fff;
  --text: #1a1b26;
  --text2: #6b6d7b;
  --border: #e8e9ef;
  --accent: #4c5fd5;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", serif;
  background: #f5f3ef;
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
}

/* Background bookshelf texture */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    repeating-linear-gradient(90deg, transparent, transparent 119px, rgba(0,0,0,.03) 119px, rgba(0,0,0,.03) 120px),
    linear-gradient(180deg, #f5f3ef 0%, #ebe7e0 100%);
  pointer-events: none; z-index: 0;
}

.container {
  position: relative; z-index: 1;
  max-width: 520px; width: 90%;
  padding: 48px 0;
}

/* Header */
.header {
  text-align: center; margin-bottom: 40px;
  animation: fadeUp .6s cubic-bezier(.16,1,.3,1) both;
}
.header .books {
  display: flex; justify-content: center; gap: 4px; margin-bottom: 24px;
}
.header .books span {
  display: inline-flex; align-items: center; justify-content: center;
  width: 44px; height: 64px; border-radius: 4px 4px 2px 2px;
  font-size: 1.3rem; font-weight: 700; color: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,.1);
  transition: transform .3s cubic-bezier(.16,1,.3,1);
}
.header .books span:nth-child(1) { background: #4c5fd5; animation: bookIn .5s .1s cubic-bezier(.16,1,.3,1) both; }
.header .books span:nth-child(2) { background: #e84855; animation: bookIn .5s .18s cubic-bezier(.16,1,.3,1) both; }
.header .books span:nth-child(3) { background: #0d8c4a; animation: bookIn .5s .26s cubic-bezier(.16,1,.3,1) both; }
.header .books span:nth-child(4) { background: #d48900; animation: bookIn .5s .34s cubic-bezier(.16,1,.3,1) both; }
.header .books span:nth-child(5) { background: #7c5ce0; animation: bookIn .5s .42s cubic-bezier(.16,1,.3,1) both; }
.header .books span:hover { transform: translateY(-6px) scale(1.05); }
@keyframes bookIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.header h1 {
  font-size: 2rem; font-weight: 700;
  letter-spacing: -.02em; color: var(--ink);
  margin-bottom: 8px;
}
.header .tagline {
  font-size: .9rem; color: var(--text2);
  font-weight: 400;
}

/* Cards */
.links {
  display: flex; flex-direction: column; gap: 10px;
}
.link-card {
  display: flex; align-items: center; gap: 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 24px;
  text-decoration: none; color: inherit;
  transition: all .25s cubic-bezier(.16,1,.3,1);
  position: relative; overflow: hidden;
  animation: fadeUp .5s cubic-bezier(.16,1,.3,1) both;
}
.link-card:nth-child(1) { animation-delay: .15s; }
.link-card:nth-child(2) { animation-delay: .25s; }
.link-card:nth-child(3) { animation-delay: .35s; }
.link-card:hover {
  transform: translateX(4px);
  border-color: var(--accent);
  box-shadow: 0 4px 20px rgba(76,95,213,.1);
}
.link-card::after {
  content: '→'; font-size: 1.1rem; color: #c0c3d0;
  margin-left: auto; transition: all .25s;
}
.link-card:hover::after {
  color: var(--accent); transform: translateX(4px);
}

.link-card .icon {
  font-size: 2rem; width: 52px; height: 52px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 12px; flex-shrink: 0;
}
.link-card .icon.reader { background: #eef0ff; }
.link-card .icon.admin { background: #fef4e8; }
.link-card .icon.docs { background: #eef5f0; }

.link-card .info { flex: 1; min-width: 0; }
.link-card .info h3 { font-size: 1rem; font-weight: 600; letter-spacing: -.01em; margin-bottom: 3px; }
.link-card .info p { font-size: .8rem; color: var(--text2); line-height: 1.4; }

.link-card .tag {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: .68rem; font-weight: 600; letter-spacing: .02em;
  background: #f1f3f6; color: var(--text2); margin-top: 4px;
}

/* Footer */
.footer {
  text-align: center; margin-top: 32px;
  font-size: .78rem; color: var(--text2);
  animation: fadeUp .5s .45s cubic-bezier(.16,1,.3,1) both;
}
.footer a { color: var(--accent); text-decoration: none; }
.footer a:hover { text-decoration: underline; }
.footer .dot { margin: 0 6px; opacity: .4; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 480px) {
  .header h1 { font-size: 1.5rem; }
  .link-card { padding: 16px 18px; border-radius: 14px; }
  .link-card .icon { width: 44px; height: 44px; font-size: 1.6rem; }
  .header .books span { width: 36px; height: 52px; font-size: 1rem; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; animation-delay: 0s !important; transition-duration: .01ms !important; }
}
</style>
</head>
<body>

<div class="container">
  <header class="header">
    <div class="books">
      <span>📖</span><span>📕</span><span>📗</span><span>📘</span><span>📙</span>
    </div>
    <h1>图书管理系统</h1>
    <p class="tagline">Library Management System</p>
  </header>

  <div class="links">
    <a href="frontend/front/index.html" class="link-card">
      <div class="icon reader">👤</div>
      <div class="info">
        <h3>读者端</h3>
        <p>图书检索 · 在线借阅 · 借阅历史</p>
        <span class="tag">zhangsan / 123456</span>
      </div>
    </a>

    <a href="frontend/admin/index.html" class="link-card">
      <div class="icon admin">🔑</div>
      <div class="info">
        <h3>管理端</h3>
        <p>仪表盘 · 图书管理 · 借阅审批</p>
        <span class="tag">admin / admin123</span>
      </div>
    </a>

    <a href="PROJECT_STRUCTURE.md" class="link-card">
      <div class="icon docs">📋</div>
      <div class="info">
        <h3>项目结构文档</h3>
        <p>快速了解项目架构与技术细节</p>
        <span class="tag">README</span>
      </div>
    </a>
  </div>

  <footer class="footer">
    <span>MySQL 8.0</span><span class="dot">·</span>
    <span>Spring Boot 3.2</span><span class="dot">·</span>
    <span>Java 17</span>
    <br>
    <a href="https://github.com/Zamp1e/library-management-system">GitHub</a>
  </footer>
</div>

</body>
</html>
