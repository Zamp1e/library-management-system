<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理 - 图书管理</title>
<link rel="stylesheet" href="../css/style.css">
<style>
.book-list { display: flex; flex-direction: column; gap: 2px; background: var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.book-row { display: flex; align-items: center; gap: 16px; background: var(--bg-card); padding: 14px 18px; }
.book-row:hover { background: #f8f9fd; }
.book-main { flex: 1; min-width: 0; }
.book-main h4 { font-size: .95rem; margin-bottom: 4px; }
.book-main .meta { font-size: .8rem; color: var(--text-secondary); line-height: 1.7; }
.book-stock { text-align: center; min-width: 72px; }
.book-stock .num { font-size: 1.1rem; font-weight: 700; }
.book-stock .lbl { font-size: .75rem; color: var(--text-secondary); }
.book-actions { display: flex; flex-direction: column; gap: 6px; min-width: 72px; }
.book-actions .btn { justify-content: center; }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="main-header"><h2>📚 图书管理</h2><button class="btn btn-primary" onclick="openBookModal()">+ 新增图书</button></div>
    <div class="main-content">
      <div class="card">
        <div class="search-bar">
          <input type="text" class="form-control" id="keyword" placeholder="书名、作者、ISBN...">
          <select class="form-control" id="categoryFilter" onchange="loadBooks()"><option value="">全部分类</option></select>
          <button class="btn btn-primary" onclick="loadBooks()">🔍 搜索</button>
        </div>
        <div class="book-list" id="bookList"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="bookModal">
  <div class="modal">
    <div class="modal-header"><h3 id="modalTitle">新增图书</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <form id="bookForm">
        <input type="hidden" id="bookId">
        <div class="form-row">
          <div class="form-group"><label>书名 *</label><input class="form-control" id="title" required></div>
          <div class="form-group"><label>作者 *</label><input class="form-control" id="author" required></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>ISBN *</label><input class="form-control" id="isbn" required></div>
          <div class="form-group"><label>出版社 *</label><input class="form-control" id="publisher" required></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>分类 *</label><select class="form-control" id="category" required></select></div>
          <div class="form-group"><label>价格 *</label><input class="form-control" id="price" type="number" step="0.01" required></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>馆藏数量 *</label><input class="form-control" id="total" type="number" required></div>
          <div class="form-group"><label>馆藏位置</label><input class="form-control" id="location" placeholder="A区-3排-15号"></div>
        </div>
        <div class="form-group"><label>图书简介</label><textarea class="form-control" id="description" rows="3"></textarea></div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveBook()">保存</button>
    </div>
  </div>
</div>

<div class="toast-container"></div>
<script src="../mock/data.js"></script>
<script src="../js/api.js"></script>
<script src="common.js"></script>
<script>
initAdmin();
const cats = MOCK.categories;
cats.forEach(c => { document.getElementById('categoryFilter').innerHTML += `<option value="${c}">${c}</option>`; document.getElementById('category').innerHTML += `<option value="${c}">${c}</option>`; });
loadBooks();

async function loadBooks() {
  const keyword = document.getElementById('keyword').value;
  const category = document.getElementById('categoryFilter').value;
  const res = await API.books.list({ keyword, category });
  document.getElementById('bookList').innerHTML = res.list.length === 0
    ? '<div class="empty-state"><div class="icon">📭</div><p>暂无图书</p></div>'
    : res.list.map(b => `
      <div class="book-row">
        <div class="book-main">
          <h4>${b.title}</h4>
          <div class="meta">
            作者：${b.author} &nbsp;|&nbsp; 出版社：${b.publisher} &nbsp;|&nbsp; ISBN：${b.isbn}
            &nbsp;|&nbsp; <span class="badge badge-info">${b.category}</span>
            &nbsp;|&nbsp; 位置：${b.location || '-'} &nbsp;|&nbsp; 价格：¥${b.price.toFixed(2)}
          </div>
        </div>
        <div class="book-stock">
          <div class="num" style="color:${b.available > 0 ? 'var(--success)' : 'var(--danger)'}">${b.available} / ${b.total}</div>
          <div class="lbl">可借 / 馆藏</div>
        </div>
        <div class="book-actions">
          <button class="btn btn-sm btn-outline" onclick="openBookModal(${b.id})">编辑</button>
          <button class="btn btn-sm btn-danger" onclick="deleteBook(${b.id}, '${b.title.replace(/'/g, "\\'")}')">删除</button>
        </div>
      </div>
    `).join('');
  staggerRows('.book-row');
}

async function openBookModal(id) {
  document.getElementById('modalTitle').textContent = id ? '编辑图书' : '新增图书';
  document.getElementById('bookId').value = '';
  document.getElementById('bookForm').reset();
  if (id) {
    const book = await API.books.detail(id);
    document.getElementById('bookId').value = book.id;
    document.getElementById('title').value = book.title;
    document.getElementById('author').value = book.author;
    document.getElementById('isbn').value = book.isbn;
    document.getElementById('publisher').value = book.publisher;
    document.getElementById('category').value = book.category;
    document.getElementById('price').value = book.price;
    document.getElementById('total').value = book.total;
    document.getElementById('location').value = book.location || '';
    document.getElementById('description').value = book.description || '';
  }
  document.getElementById('bookModal').classList.add('show');
}

function closeModal() { document.getElementById('bookModal').classList.remove('show'); }

async function saveBook() {
  const id = document.getElementById('bookId').value;
  const data = {
    title: document.getElementById('title').value,
    author: document.getElementById('author').value,
    isbn: document.getElementById('isbn').value,
    publisher: document.getElementById('publisher').value,
    category: document.getElementById('category').value,
    price: parseFloat(document.getElementById('price').value),
    total: parseInt(document.getElementById('total').value),
    location: document.getElementById('location').value,
    description: document.getElementById('description').value,
  };
  if (!data.title || !data.author || !data.isbn) { showToast('请填写必填项', 'error'); return; }
  try {
    if (id) { await API.books.update(parseInt(id), data); showToast('更新成功', 'success'); }
    else { await API.books.add(data); showToast('新增成功', 'success'); }
    closeModal(); loadBooks();
  } catch (err) { showToast(err.message, 'error'); }
}

async function deleteBook(id, title) {
  if (!confirm(`确认删除《${title}》？此操作不可恢复。`)) return;
  await API.books.delete(id);
  showToast('删除成功', 'success');
  loadBooks();
}
</script>
</body>
</html>
