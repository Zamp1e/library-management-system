<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理 - 管理员管理</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="main-header"><h2>🔑 管理员账号管理</h2><button class="btn btn-primary" id="addAdminBtn" onclick="openAdminModal()">+ 新增管理员</button></div>
    <div class="main-content">
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr><th>ID</th><th>用户名</th><th>姓名</th><th>角色</th><th>手机号</th><th>创建时间</th><th>状态</th><th>操作</th></tr></thead>
            <tbody id="adminTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="adminModal">
  <div class="modal">
    <div class="modal-header"><h3 id="modalTitle">新增管理员</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <form id="adminForm">
        <input type="hidden" id="adminId">
        <div class="form-row">
          <div class="form-group"><label>用户名 *</label><input class="form-control" id="username" required></div>
          <div class="form-group"><label>姓名 *</label><input class="form-control" id="name" required></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>密码</label><input class="form-control" id="password" type="password" placeholder="留空则不修改"></div>
          <div class="form-group"><label>手机号</label><input class="form-control" id="phone"></div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveAdmin()">保存</button>
    </div>
  </div>
</div>

<div class="toast-container"></div>
<script src="../mock/data.js"></script>
<script src="../js/api.js"></script>
<script src="common.js"></script>
<script>
initAdmin();
const user = JSON.parse(localStorage.getItem('user') || '{}');
const isSuperAdmin = user.role === 'super_admin';

if (!isSuperAdmin) {
  document.getElementById('adminTable').innerHTML = '<tr><td colspan="8"><div class="empty-state"><div class="icon">🔒</div><p>仅系统管理员可访问此页面</p></div></td></tr>';
  document.getElementById('addAdminBtn').style.display = 'none';
} else {
  loadAdmins();
}

async function loadAdmins() {
  const res = await API.users.list({ role: 'admin' });
  document.getElementById('adminTable').innerHTML = res.list.length === 0
    ? '<tr><td colspan="8"><div class="empty-state"><div class="icon">📭</div><p>暂无管理员</p></div></td></tr>'
    : res.list.map(u => `<tr>
      <td>${u.id}</td><td>${u.username}</td><td>${u.name}</td>
      <td><span class="badge badge-info">管理员</span></td>
      <td>${u.phone || '-'}</td><td>${u.createdAt}</td>
      <td><span class="badge ${u.status ? 'badge-success' : 'badge-danger'}">${u.status ? '正常' : '禁用'}</span></td>
      <td>
        <button class="btn btn-sm btn-outline" onclick="openAdminModal(${u.id})">编辑</button>
        <button class="btn btn-sm btn-danger" onclick="deleteAdmin(${u.id}, '${u.name}')">删除</button>
      </td></tr>`).join('');
}

async function openAdminModal(id) {
  document.getElementById('modalTitle').textContent = id ? '编辑管理员' : '新增管理员';
  document.getElementById('adminForm').reset();
  document.getElementById('adminId').value = '';
  document.getElementById('password').placeholder = '留空则不修改';
  if (id) {
    const res = await API.users.list({ role: 'admin' });
    const u = res.list.find(x => x.id === id);
    if (u) {
      document.getElementById('adminId').value = u.id;
      document.getElementById('username').value = u.username;
      document.getElementById('name').value = u.name;
      document.getElementById('phone').value = u.phone || '';
      document.getElementById('password').placeholder = '留空则不修改密码';
    }
  }
  document.getElementById('adminModal').classList.add('show');
}

function closeModal() { document.getElementById('adminModal').classList.remove('show'); }

async function saveAdmin() {
  const id = document.getElementById('adminId').value;
  const data = { username: document.getElementById('username').value, name: document.getElementById('name').value, phone: document.getElementById('phone').value, role: 'admin' };
  const pwd = document.getElementById('password').value;
  if (pwd) data.password = pwd;
  if (!data.username || !data.name) { showToast('请填写必填项', 'error'); return; }
  try {
    if (id) { await API.users.update(parseInt(id), data); showToast('更新成功', 'success'); }
    else { await API.users.create(data); showToast('新增成功', 'success'); }
    closeModal(); loadAdmins();
  } catch (err) { showToast(err.message, 'error'); }
}

async function deleteAdmin(id, name) {
  if (!confirm(`确认删除管理员"${name}"？此操作不可恢复。`)) return;
  await API.users.delete(id);
  showToast('删除成功', 'success');
  loadAdmins();
}
</script>
</body>
</html>
