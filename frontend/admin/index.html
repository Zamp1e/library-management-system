<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理 - 仪表盘</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="main-header"><h2>📊 仪表盘</h2><span></span></div>
    <div class="main-content">
      <div class="stat-grid" id="statGrid"></div>
      <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;">
        <div class="card"><div class="card-header"><h3>借阅趋势（近6月）</h3></div><div id="trendChart" style="overflow:hidden;height:280px;"></div></div>
        <div class="card"><div class="card-header"><h3>图书分类分布</h3></div><div id="categoryChart" style="overflow:hidden;height:400px;"></div></div>
      </div>
    </div>
  </div>
</div>
<div class="toast-container"></div>
<script src="../mock/data.js"></script>
<script src="../js/api.js"></script>
<script src="common.js"></script>
<script>
initAdmin();

async function loadStats() {
  var stats = await API.stats.overview();
  document.getElementById('statGrid').innerHTML =
    '<div class="stat-card"><div class="stat-icon blue">📚</div><div class="stat-info"><div class="stat-value">' + stats.totalBooks + '</div><div class="stat-label">馆藏图书总数</div></div></div>' +
    '<div class="stat-card"><div class="stat-icon green">👥</div><div class="stat-info"><div class="stat-value">' + stats.totalReaders + '</div><div class="stat-label">注册读者数</div></div></div>' +
    '<div class="stat-card"><div class="stat-icon orange">📥</div><div class="stat-info"><div class="stat-value">' + stats.borrowing + '</div><div class="stat-label">当前借阅中</div></div></div>' +
    '<div class="stat-card"><div class="stat-icon red">⚠️</div><div class="stat-info"><div class="stat-value">' + stats.overdue + '</div><div class="stat-label">逾期未还</div></div></div>';
  renderTrend(stats.borrowingTrend);
  renderCategory(stats.categoryDist);
}

// ====== SVG 柱状图：借阅趋势 ======
function renderTrend(data) {
  var W = 480, H = 260, pad = {top:20, right:20, bottom:40, left:40};
  var cw = W - pad.left - pad.right, ch = H - pad.top - pad.bottom;
  var barW = 40, gap = (cw - barW * data.length) / (data.length + 1);
  var max = Math.max.apply(null, data.map(function(d){return d.count;}));
  max = Math.max(max, 1);

  var bars = '';
  var labels = '';
  var lines = '';
  // 网格线
  for (var i = 0; i <= 4; i++) {
    var y = pad.top + ch * i / 4;
    var v = Math.round(max * (4 - i) / 4);
    lines += '<line x1="' + pad.left + '" y1="' + y + '" x2="' + (W - pad.right) + '" y2="' + y + '" stroke="#e2e4ea" stroke-width="1"/>';
    lines += '<text x="' + (pad.left - 8) + '" y="' + (y + 4) + '" text-anchor="end" font-size="11" fill="#5b5d6b">' + v + '</text>';
  }
  for (var i = 0; i < data.length; i++) {
    var h = ch * data[i].count / max;
    var x = pad.left + gap + i * (barW + gap);
    var y = pad.top + ch - h;
    var hue = 235;
    var lightness = 68 - i * 10;
    bars += '<rect x="' + x + '" y="' + y + '" width="' + barW + '" height="' + h + '" rx="4" fill="hsl(' + hue + ',55%,' + lightness + '%)"/>';
    bars += '<text x="' + (x + barW/2) + '" y="' + (y - 6) + '" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1b26">' + data[i].count + '</text>';
    labels += '<text x="' + (x + barW/2) + '" y="' + (H - 8) + '" text-anchor="middle" font-size="11" fill="#5b5d6b">' + data[i].month + '</text>';
  }

  document.getElementById('trendChart').innerHTML =
    '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:100%;" preserveAspectRatio="xMidYMid meet">' + lines + bars + labels + '</svg>';
}

// ====== SVG 横向柱状图：分类分布 ======
function renderCategory(data) {
  data.sort(function(a,b){return b.value - a.value;});
  var H = data.length * 36 + 10, W = 320, barH = 22;
  var colors = ['#4c5fd5','#5b6fe0','#6b7deb','#0d8c4a','#d48900','#c53030','#7c5ce0','#3d9ed7','#5b5d6b','#e0654e'];
  var max = Math.max.apply(null, data.map(function(d){return d.value;}));
  max = Math.max(max, 1);

  var bars = '';
  for (var i = 0; i < data.length; i++) {
    var y = i * 36 + 8;
    var w = (W - 80) * data[i].value / max;
    bars += '<text x="0" y="' + (y + 16) + '" font-size="12" fill="#5b5d6b">' + data[i].name + '</text>';
    bars += '<rect x="50" y="' + y + '" width="' + w + '" height="' + barH + '" rx="3" fill="' + colors[i % colors.length] + '"/>';
    bars += '<text x="' + (52 + w) + '" y="' + (y + 16) + '" font-size="12" font-weight="600" fill="#1a1b26">' + data[i].value + '</text>';
  }

  document.getElementById('categoryChart').innerHTML =
    '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:100%;" preserveAspectRatio="xMidYMid meet">' + bars + '</svg>';
}
</script>
</body>
</html>
