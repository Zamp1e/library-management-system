<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理 - 仪表盘</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="main-header"><h2>📊 仪表盘</h2><span></span></div>
    <div class="main-content">
      <div class="stat-grid" id="statGrid"></div>
      <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;">
        <div class="card"><div class="card-header"><h3>借阅趋势（近6月）</h3></div><div id="trendChart" style="overflow:hidden;height:280px;"></div></div>
        <div class="card"><div class="card-header"><h3>图书分类分布</h3></div><div id="categoryChart" style="overflow:hidden;height:400px;"></div></div>
      </div>
    </div>
  </div>
</div>
<div class="toast-container"></div>
<script src="../mock/data.js"></script>
<script src="../js/api.js"></script>
<script src="common.js"></script>
<script>
initAdmin();

async function loadStats() {
  var stats = await API.stats.overview();
  document.getElementById('statGrid').innerHTML =
    '<div class="stat-card"><div class="stat-icon blue">📚</div><div class="stat-info"><div class="stat-value">' + stats.totalBooks + '</div><div class="stat-label">馆藏图书总数</div></div></div>' +
    '<div class="stat-card"><div class="stat-icon green">👥</div><div class="stat-info"><div class="stat-value">' + stats.totalReaders + '</div><div class="stat-label">注册读者数</div></div></div>' +
    '<div class="stat-card"><div class="stat-icon orange">📥</div><div class="stat-info"><div class="stat-value">' + stats.borrowing + '</div><div class="stat-label">当前借阅中</div></div></div>' +
    '<div class="stat-card"><div class="stat-icon red">⚠️</div><div class="stat-info"><div class="stat-value">' + stats.overdue + '</div><div class="stat-label">逾期未还</div></div></div>';
  renderTrend(stats.borrowingTrend);
  renderCategory(stats.categoryDist);
}

// ====== SVG 柱状图：借阅趋势 ======
function renderTrend(data) {
  var W = 560, H = 280;
  var pad = {top:30, right:30, bottom:50, left:50};
  var cw = W - pad.left - pad.right;
  var ch = H - pad.top - pad.bottom;
  var barW = 44;
  var gap = (cw - barW * data.length) / (data.length + 1);
  var max = Math.max.apply(null, data.map(function(d){return d.count;}));
  max = Math.max(max, 1);
  var ticks = 5;

  var svg = '';
  // Grid + Y-axis labels
  for (var i = 0; i <= ticks; i++) {
    var y = pad.top + (ch * i / ticks);
    var v = Math.round(max * (ticks - i) / ticks);
    svg += '<line x1="' + pad.left + '" y1="' + y + '" x2="' + (W - pad.right) + '" y2="' + y + '" stroke="#e8e0d4" stroke-width="0.8" stroke-dasharray="4,4"/>';
    svg += '<text x="' + (pad.left - 10) + '" y="' + (y + 4) + '" text-anchor="end" font-family="Georgia,serif" font-size="12" fill="#a09888">' + v + '</text>';
  }
  // Bars
  var earthtones = ['#8b7355','#a0896c','#6b8a5e','#5b7a4c','#8b6b5e','#7b8a6e'];
  for (var i = 0; i < data.length; i++) {
    var h = Math.max(ch * data[i].count / max, 4);
    var x = pad.left + gap + i * (barW + gap);
    var y = pad.top + ch - h;
    svg += '<rect x="' + x + '" y="' + y + '" width="' + barW + '" height="' + h + '" rx="5" fill="' + earthtones[i] + '" opacity="0.88"/>';
    svg += '<rect x="' + x + '" y="' + y + '" width="' + barW + '" height="5" rx="5" fill="' + earthtones[i] + '" opacity="0.4"/>';
    svg += '<text x="' + (x + barW/2) + '" y="' + (y - 8) + '" text-anchor="middle" font-family="Georgia,serif" font-size="13" font-weight="700" fill="#5b4c38">' + data[i].count + '</text>';
    svg += '<text x="' + (x + barW/2) + '" y="' + (H - 12) + '" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#a09888">' + data[i].month + '</text>';
  }
  // Baseline
  svg += '<line x1="' + pad.left + '" y1="' + (pad.top + ch) + '" x2="' + (W - pad.right) + '" y2="' + (pad.top + ch) + '" stroke="#d5cbbb" stroke-width="1"/>';

  document.getElementById('trendChart').innerHTML =
    '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:100%;" preserveAspectRatio="xMidYMid meet">' + svg + '</svg>';
}

// ====== SVG 横向柱状图：分类分布 ======
function renderCategory(data) {
  data.sort(function(a,b){return b.value - a.value;});
  var rowH = 32, pad = 10;
  var H = data.length * rowH + pad * 2;
  var W = 340, barX = 56, barMax = W - barX - 40;
  var colors = ['#8b7355','#6b8a5e','#a0896c','#5b7a4c','#8b6b5e','#7b8a6e','#9b8b75','#6b7a5e','#a0806c','#7b6b5e'];
  var max = Math.max.apply(null, data.map(function(d){return d.value;}));
  max = Math.max(max, 1);

  var svg = '';
  for (var i = 0; i < data.length; i++) {
    var y = pad + i * rowH;
    var w = Math.max(barMax * data[i].value / max, 6);
    // Background track
    svg += '<rect x="' + barX + '" y="' + (y + 6) + '" width="' + barMax + '" height="16" rx="8" fill="#f0ebe0"/>';
    // Bar
    svg += '<rect x="' + barX + '" y="' + (y + 6) + '" width="' + w + '" height="16" rx="8" fill="' + colors[i % colors.length] + '" opacity="0.85"/>';
    // Label
    svg += '<text x="' + (barX - 8) + '" y="' + (y + 19) + '" text-anchor="end" font-family="Georgia,serif" font-size="12" fill="#5b4c38">' + data[i].name + '</text>';
    // Value
    svg += '<text x="' + (barX + w + 8) + '" y="' + (y + 19) + '" font-family="Georgia,serif" font-size="12" font-weight="700" fill="#5b4c38">' + data[i].value + '</text>';
  }

  document.getElementById('categoryChart').innerHTML =
    '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:100%;" preserveAspectRatio="xMidYMid meet">' + svg + '</svg>';
}
</script>
</body>
</html>
