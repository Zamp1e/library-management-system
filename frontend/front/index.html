<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图书管理系统 - 图书检索</title>
<link rel="stylesheet" href="../css/style.css">
<style>
.book-list { display: flex; flex-direction: column; gap: 2px; background: var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.book-row { display: flex; align-items: center; gap: 16px; background: var(--bg-card); padding: 14px 18px; }
.book-row:hover { background: #f8f9fd; }
.book-main { flex: 1; min-width: 0; }
.book-main h4 { font-size: .95rem; margin-bottom: 4px; }
.book-main h4 a { color: var(--text); }
.book-main h4 a:hover { color: var(--primary); }
.book-main .meta { font-size: .8rem; color: var(--text-secondary); line-height: 1.7; }
.book-stock { text-align: center; min-width: 72px; }
.book-stock .num { font-size: 1.1rem; font-weight: 700; }
.book-stock .lbl { font-size: .75rem; color: var(--text-secondary); }
.book-actions { display: flex; flex-direction: column; gap: 6px; min-width: 72px; }
.book-actions .btn { justify-content: center; }
.empty-row { background: var(--bg-card); padding: 40px; }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="main-header"><h2>🔍 图书检索</h2><span></span></div>
    <div class="main-content">
      <div class="stat-grid" id="readerStats" style="margin-bottom:20px;"></div>
      <div class="search-bar">
        <select class="form-control" id="categoryFilter" onchange="search()"><option value="">全部分类</option></select>
        <input type="text" class="form-control" id="keyword" placeholder="输入书名、作者或ISBN搜索...">
        <button class="btn btn-primary" onclick="search()">🔍 搜索</button>
      </div>
      <div class="book-list" id="bookList"></div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>
</div>
<div class="toast-container"></div>
<script src="../mock/data.js"></script>
<script src="../js/api.js"></script>
<script src="common.js"></script>
<script>
initReader();
var currentPage = 1, pageSize = 10, allBooks = [];

function init() {
  var cats = MOCK.categories;
  var sel = document.getElementById('categoryFilter');
  cats.forEach(function(c) { var o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });
  loadReaderStats();
  search();
}

async function loadReaderStats() {
  var user = JSON.parse(localStorage.getItem('reader_user') || '{}');
  if (!user.id) return;
  try {
    var res = await API.borrows.list({ userId: user.id });
    var list = res.list || [];
    var borrowing = list.filter(function(b) { return b.status === 'borrowed'; }).length;
    var tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
    var tmStr = tomorrow.toISOString().slice(0, 10);
    var dueSoon = list.filter(function(b) { return b.status === 'borrowed' && b.dueDate === tmStr; }).length;
    // Count all borrowed items due within 2 days as "临期"
    var dueSoonWarn = list.filter(function(b) { return b.status === 'borrowed' && b.dueDate <= tmStr; }).length;
    document.getElementById('readerStats').innerHTML =
      '<a href="my-books.html?status=borrowed" class="stat-card" style="text-decoration:none;color:inherit"><div class="stat-icon orange">📥</div><div class="stat-info"><div class="stat-value">' + borrowing + '</div><div class="stat-label">当前借阅中</div></div></a>' +
      '<a href="my-books.html?status=dueSoon" class="stat-card" style="text-decoration:none;color:inherit"><div class="stat-icon ' + (dueSoonWarn > 0 ? 'red' : 'blue') + '">⚠️</div><div class="stat-info"><div class="stat-value">' + dueSoonWarn + '</div><div class="stat-label">临期应还（2天内）</div></div></a>';
  } catch(e) {}
}

async function search() {
  var keyword = document.getElementById('keyword').value;
  var category = document.getElementById('categoryFilter').value;
  var res = await API.books.list({ keyword: keyword, category: category });
  allBooks = res.list;
  currentPage = 1;
  renderBooks();
}

function renderBooks() {
  var start = (currentPage - 1) * pageSize;
  var items = allBooks.slice(start, start + pageSize);
  var el = document.getElementById('bookList');
  if (items.length === 0) { el.innerHTML = '<div class="empty-row"><div class="empty-state"><div class="icon">📭</div><p>暂无图书</p></div></div>'; document.getElementById('pagination').innerHTML = ''; return; }
  el.innerHTML = items.map(function(b) {
    return '<div class="book-row"><div class="book-main"><h4><a href="book-detail.html?id=' + b.id + '">' + b.title + '</a></h4><div class="meta">作者：' + b.author + ' &nbsp;|&nbsp; 出版社：' + b.publisher + ' &nbsp;|&nbsp; ISBN：' + b.isbn + ' &nbsp;|&nbsp; <span class="badge badge-info">' + b.category + '</span> &nbsp;|&nbsp; 位置：' + (b.location || '-') + ' &nbsp;|&nbsp; 价格：¥' + b.price.toFixed(2) + '</div></div><div class="book-stock"><div class="num" style="color:' + (b.available > 0 ? 'var(--success)' : 'var(--danger)') + '">' + b.available + ' / ' + b.total + '</div><div class="lbl">可借 / 馆藏</div></div><div class="book-actions"><a href="book-detail.html?id=' + b.id + '" class="btn btn-sm btn-outline">查看详情</a>' + (b.available > 0 ? '<button class="btn btn-sm btn-primary" onclick="borrowBook(' + b.id + ', \'' + b.title.replace(/'/g, "\\'") + '\')">立即借阅</button>' : '<button class="btn btn-sm" disabled style="opacity:.5">暂无可借</button>') + '</div></div>';
  }).join('');
  renderPagination();
}

function renderPagination() {
  var total = Math.ceil(allBooks.length / pageSize);
  var el = document.getElementById('pagination');
  if (total <= 1) { el.innerHTML = ''; return; }
  var html = '<button ' + (currentPage === 1 ? 'disabled' : '') + ' onclick="goPage(' + (currentPage - 1) + ')">«</button>';
  for (var i = 1; i <= total; i++) { html += '<button class="' + (i === currentPage ? 'active' : '') + '" onclick="goPage(' + i + ')">' + i + '</button>'; }
  html += '<button ' + (currentPage === total ? 'disabled' : '') + ' onclick="goPage(' + (currentPage + 1) + ')">»</button>';
  el.innerHTML = html;
}

function goPage(p) { currentPage = p; renderBooks(); window.scrollTo(0, 0); }

async function borrowBook(bookId, title) {
  var user = JSON.parse(localStorage.getItem('reader_user') || '{}');
  var dueDate = new Date(Date.now() + 30 * 24 * 3600 * 1000).toISOString().slice(0, 10);
  try {
    await API.borrows.create({ bookId: bookId, userId: user.id, userName: user.name, dueDate: dueDate });
    showToast('《' + title + '》借阅申请已提交，等待管理员审核', 'success');
    setTimeout(function() { location.reload(); }, 800);
  } catch (err) { showToast(err.message, 'error'); }
}

init();
</script>
</body>
</html>
