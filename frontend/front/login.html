<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图书管理系统 - 读者登录</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">
<div class="auth-card">
  <h2>📚 图书管理系统</h2>
  <p style="text-align:center;color:var(--text-secondary);margin-bottom:20px;">读者登录</p>
  <form id="loginForm">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" class="form-control" id="username" placeholder="请输入用户名" required>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" class="form-control" id="password" placeholder="请输入密码" required>
    </div>
    <button type="submit" class="btn btn-primary">登 录</button>
  </form>
  <p class="alt-link"><a href="../admin/login.html" style="color:var(--text-secondary);font-size:.85rem;">管理员登录 →</a></p>
  <p style="text-align:center;margin-top:12px;color:var(--text-secondary);font-size:.78rem;">演示账号：zhangsan / 123456 &nbsp;|&nbsp; lisi / 123456</p>
</div>
<script>
if ('scrollRestoration' in history) { history.scrollRestoration = 'manual'; }
window.addEventListener('load', function() { window.scrollTo(0, 0); });
</script>
<script src="../mock/data.js"></script>
<script src="../js/api.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  try {
    const res = await API.auth.login(username, password);
    if (res.user.role !== 'reader') { showToast('请使用读者账号登录', 'error'); return; }
    localStorage.setItem('reader_token', res.token);
    localStorage.setItem('reader_user', JSON.stringify(res.user));
    showToast('登录成功', 'success');
    setTimeout(() => location.href = 'index.html', 500);
  } catch (err) { showToast(err.message, 'error'); }
});

function showToast(msg, type) {
  const container = document.querySelector('.toast-container') || (() => { const c = document.createElement('div'); c.className = 'toast-container'; document.body.appendChild(c); return c; })();
  const toast = document.createElement('div'); toast.className = 'toast toast-' + type; toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => toast.classList.add('toast-exit'), 2600);
  setTimeout(() => toast.remove(), 2900);
}
</script>
</body>
</html>
