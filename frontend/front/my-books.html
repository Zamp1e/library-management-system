<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的借阅</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="main-header"><h2>📖 我的借阅</h2><span></span></div>
    <div class="main-content">
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr><th>图书名称</th><th>借阅日期</th><th>应还日期</th><th>归还日期</th><th>状态</th><th>操作</th></tr></thead>
            <tbody id="borrowList"><tr><td colspan="6" style="text-align:center;padding:20px;color:var(--text-secondary);">加载中...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast-container"></div>
<script src="../mock/data.js"></script>
<script src="../js/api.js"></script>
<script src="common.js"></script>
<script>
initReader();

async function init() {
  var user = JSON.parse(localStorage.getItem('reader_user') || '{}');
  var res = await API.borrows.list({ userId: user.id });
  var list = res.list || [];

  // 读取 URL 参数预筛选
  var params = new URLSearchParams(location.search);
  var filterStatus = params.get('status');
  if (filterStatus === 'borrowed') {
    list = list.filter(function(b) { return b.status === 'borrowed'; });
    document.querySelector('.main-header h2').textContent = '📖 借阅中';
  } else if (filterStatus === 'dueSoon') {
    var tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 2);
    var limit = tomorrow.toISOString().slice(0, 10);
    list = list.filter(function(b) { return b.status === 'borrowed' && b.dueDate <= limit; });
    document.querySelector('.main-header h2').textContent = '⚠️ 临期应还';
  }

  renderList(list);
}

function renderList(list) {
  var tbody = document.getElementById('borrowList');
  if (list.length === 0) { tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="icon">📭</div><p>暂无借阅记录</p></div></td></tr>'; return; }
  var statusMap = { applying: { text: '审核中', cls: 'badge-info' }, borrowed: { text: '借阅中', cls: 'badge-warning' }, returned: { text: '已归还', cls: 'badge-success' }, rejected: { text: '已拒绝', cls: 'badge-danger' } };
  tbody.innerHTML = list.map(function(b) {
    var s = statusMap[b.status] || { text: b.status, cls: '' };
    return '<tr><td><a href="book-detail.html?id=' + b.bookId + '">' + b.bookTitle + '</a></td><td>' + b.borrowDate + '</td><td>' + b.dueDate + '</td><td>' + (b.returnDate || '-') + '</td><td><span class="badge ' + s.cls + '">' + s.text + '</span></td><td>' + (b.status === 'borrowed' ? '<button class="btn btn-sm btn-success" onclick="returnBook(' + b.id + ')">归还</button>' : '') + '</td></tr>';
  }).join('');
}

async function returnBook(id) {
  if (!confirm('确认归还该图书？')) return;
  try { await API.borrows.returnBook(id); showToast('归还成功', 'success'); setTimeout(function() { location.reload(); }, 500); }
  catch (err) { showToast(err.message, 'error'); }
}

init();
</script>
</body>
</html>
