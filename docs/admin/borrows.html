<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理 - 借阅管理</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="main-header"><h2>📥 借阅管理</h2><span></span></div>
    <div class="main-content">
      <div class="card">
        <div class="tab-nav">
          <button class="tab-btn active" onclick="switchTab('apply')">待审核</button>
          <button class="tab-btn" onclick="switchTab('all')">全部记录</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>ID</th><th>图书名称</th><th>借阅人</th><th>借阅日期</th><th>应还日期</th><th>归还日期</th><th>状态</th><th>操作</th></tr></thead>
            <tbody id="borrowTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast-container"></div>
<script src="../mock/data.js"></script>
<script src="../js/api.js"></script>
<script src="common.js"></script>
<script>
initAdmin();
let currentTab = 'apply';
loadBorrows();

async function loadBorrows() {
  const params = currentTab === 'apply' ? { status: 'applying' } : {};
  const res = await API.borrows.list(params);
  const list = res.list;
  const statusMap = { applying: { text: '审核中', cls: 'badge-info' }, borrowed: { text: '借阅中', cls: 'badge-warning' }, returned: { text: '已归还', cls: 'badge-success' }, rejected: { text: '已拒绝', cls: 'badge-danger' } };
  document.getElementById('borrowTable').innerHTML = list.length === 0
    ? '<tr><td colspan="8"><div class="empty-state"><div class="icon">📭</div><p>暂无记录</p></div></td></tr>'
    : list.map(b => {
      const s = statusMap[b.status] || { text: b.status, cls: '' };
      return `<tr>
        <td>${b.id}</td><td><strong>${b.bookTitle}</strong></td><td>${b.userName}</td>
        <td>${b.borrowDate}</td><td>${b.dueDate}</td><td>${b.returnDate || '-'}</td>
        <td><span class="badge ${s.cls}">${s.text}</span></td>
        <td>${b.status === 'applying' ? `<button class="btn btn-sm btn-success" onclick="approve(${b.id})">通过</button> <button class="btn btn-sm btn-danger" onclick="reject(${b.id})">拒绝</button>` : b.status === 'borrowed' ? `<button class="btn btn-sm btn-primary" onclick="returnBook(${b.id})">确认归还</button>` : ''}</td>
      </tr>`;
    }).join('');
}

async function approve(id) { await API.borrows.approve(id); showToast('借阅申请已通过', 'success'); loadBorrows(); }
async function reject(id) { await API.borrows.reject(id); showToast('已拒绝该申请', 'info'); loadBorrows(); }

async function returnBook(id) {
  if (!confirm('确认该图书已归还？')) return;
  await API.borrows.returnBook(id);
  showToast('归还确认成功', 'success');
  loadBorrows();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (i === 0 && tab === 'apply') || (i === 1 && tab === 'all')));
  loadBorrows();
}
</script>
</body>
</html>
