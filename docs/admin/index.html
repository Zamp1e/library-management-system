<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理 - 仪表盘</title>
<link rel="stylesheet" href="../css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="main-header"><h2>📊 仪表盘</h2><span></span></div>
    <div class="main-content">
      <div class="stat-grid" id="statGrid"></div>
      <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;">
        <div class="card"><div class="card-header"><h3>借阅趋势（近6月）</h3></div><canvas id="trendChart" height="280"></canvas></div>
        <div class="card"><div class="card-header"><h3>图书分类分布</h3></div><canvas id="categoryChart" height="280"></canvas></div>
      </div>
    </div>
  </div>
</div>
<div class="toast-container"></div>
<script src="../mock/data.js"></script>
<script src="../js/api.js"></script>
<script src="common.js"></script>
<script>
initAdmin();
var trendChart, catChart;

async function loadStats() {
  const stats = await API.stats.overview();
  document.getElementById('statGrid').innerHTML =
    '<div class="stat-card"><div class="stat-icon blue">📚</div><div class="stat-info"><div class="stat-value">' + stats.totalBooks + '</div><div class="stat-label">馆藏图书总数</div></div></div>' +
    '<div class="stat-card"><div class="stat-icon green">👥</div><div class="stat-info"><div class="stat-value">' + stats.totalReaders + '</div><div class="stat-label">注册读者数</div></div></div>' +
    '<div class="stat-card"><div class="stat-icon orange">📥</div><div class="stat-info"><div class="stat-value">' + stats.borrowing + '</div><div class="stat-label">当前借阅中</div></div></div>' +
    '<div class="stat-card"><div class="stat-icon red">⚠️</div><div class="stat-info"><div class="stat-value">' + stats.overdue + '</div><div class="stat-label">逾期未还</div></div></div>';
  renderTrend(stats.borrowingTrend);
  renderCategory(stats.categoryDist);
}

function renderTrend(data) {
  if (trendChart) trendChart.destroy();
  trendChart = new Chart(document.getElementById('trendChart'), {
    type: 'bar',
    data: {
      labels: data.map(function(d) { return d.month; }),
      datasets: [{
        label: '借阅量',
        data: data.map(function(d) { return d.count; }),
        backgroundColor: ['#1a73e8','#4285f4','#669df6','#1a73e8','#4285f4','#669df6'],
        borderRadius: 6,
        maxBarThickness: 50
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, ticks: { stepSize: 5 } }
      }
    }
  });
}

function renderCategory(data) {
  if (catChart) catChart.destroy();
  var colors = ['#1a73e8','#0d904f','#f5a623','#d93025','#8e24aa','#00acc1','#6c757d','#20c997','#fd7e14','#6610f2'];
  // 按数量降序排列
  data.sort(function(a, b) { return b.value - a.value; });
  catChart = new Chart(document.getElementById('categoryChart'), {
    type: 'bar',
    data: {
      labels: data.map(function(d) { return d.name; }),
      datasets: [{
        label: '数量',
        data: data.map(function(d) { return d.value; }),
        backgroundColor: data.map(function(d, i) { return colors[i % colors.length]; }),
        borderRadius: 4,
        maxBarThickness: 24
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { beginAtZero: true, ticks: { stepSize: 1 } }
      }
    }
  });
}
</script>
</body>
</html>
