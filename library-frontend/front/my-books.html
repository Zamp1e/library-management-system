<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的借阅</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header class="front-header">
  <a href="index.html" class="logo">📚 图书馆</a>
  <nav>
    <a href="index.html">图书检索</a>
    <a href="my-books.html" style="color:#fff;">我的借阅</a>
    <span class="user-area">
      <span id="userName"></span>
      <button class="btn btn-sm" style="background:rgba(255,255,255,.2);color:#fff;" onclick="logout()">退出</button>
    </span>
  </nav>
</header>
<div class="front-main">
  <div class="card">
    <div class="card-header"><h3>我的借阅记录</h3></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>图书名称</th><th>借阅日期</th><th>应还日期</th><th>归还日期</th><th>状态</th><th>操作</th></tr></thead>
        <tbody id="borrowList"><tr><td colspan="6" style="text-align:center;padding:20px;color:var(--text-secondary);">加载中...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>
<div class="toast-container"></div>
<script src="../mock/data.js"></script>
<script src="../js/api.js"></script>
<script>
async function init() {
  const user = JSON.parse(localStorage.getItem('user') || '{}');
  if (!user.id) { location.href = 'login.html'; return; }
  document.getElementById('userName').textContent = user.name || user.username;
  const res = await API.borrows.list({ userId: user.id });
  renderList(res.list);
}

function renderList(list) {
  const tbody = document.getElementById('borrowList');
  if (list.length === 0) { tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="icon">📭</div><p>暂无借阅记录</p></div></td></tr>'; return; }
  const statusMap = { applying: { text: '审核中', cls: 'badge-info' }, borrowed: { text: '借阅中', cls: 'badge-warning' }, returned: { text: '已归还', cls: 'badge-success' }, rejected: { text: '已拒绝', cls: 'badge-danger' } };
  tbody.innerHTML = list.map(b => {
    const s = statusMap[b.status] || { text: b.status, cls: '' };
    return `<tr>
      <td><a href="book-detail.html?id=${b.bookId}">${b.bookTitle}</a></td>
      <td>${b.borrowDate}</td>
      <td>${b.dueDate}</td>
      <td>${b.returnDate || '-'}</td>
      <td><span class="badge ${s.cls}">${s.text}</span></td>
      <td>${b.status === 'borrowed' ? `<button class="btn btn-sm btn-success" onclick="returnBook(${b.id})">归还</button>` : ''}</td>
    </tr>`;
  }).join('');
}

async function returnBook(id) {
  if (!confirm('确认归还该图书？')) return;
  try {
    await API.borrows.returnBook(id);
    showToast('归还成功', 'success');
    setTimeout(() => location.reload(), 500);
  } catch (err) { showToast(err.message, 'error'); }
}

function showToast(msg, type) {
  const container = document.querySelector('.toast-container') || (() => { const c = document.createElement('div'); c.className = 'toast-container'; document.body.appendChild(c); return c; })();
  const toast = document.createElement('div'); toast.className = 'toast toast-' + type; toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function logout() { localStorage.clear(); location.href = 'login.html'; }
init();
</script>
</body>
</html>
