<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图书管理系统 - 注册</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">
<div class="auth-card">
  <h2>📚 读者注册</h2>
  <form id="registerForm">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" class="form-control" id="username" placeholder="请输入用户名" required>
    </div>
    <div class="form-group">
      <label>姓名</label>
      <input type="text" class="form-control" id="name" placeholder="请输入真实姓名" required>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" class="form-control" id="password" placeholder="请输入密码" required minlength="6">
    </div>
    <div class="form-group">
      <label>手机号</label>
      <input type="text" class="form-control" id="phone" placeholder="请输入手机号">
    </div>
    <button type="submit" class="btn btn-primary">注 册</button>
  </form>
  <p class="alt-link">已有账号？<a href="login.html">立即登录</a></p>
</div>
<script src="../mock/data.js"></script>
<script src="../js/api.js"></script>
<script>
document.getElementById('registerForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const data = {
    username: document.getElementById('username').value,
    name: document.getElementById('name').value,
    password: document.getElementById('password').value,
    phone: document.getElementById('phone').value,
    role: 'reader'
  };
  try {
    await API.auth.register(data);
    showToast('注册成功，请登录', 'success');
    setTimeout(() => location.href = 'login.html', 800);
  } catch (err) { showToast(err.message, 'error'); }
});
function showToast(msg, type) {
  const container = document.querySelector('.toast-container') || (() => { const c = document.createElement('div'); c.className = 'toast-container'; document.body.appendChild(c); return c; })();
  const toast = document.createElement('div'); toast.className = 'toast toast-' + type; toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}
</script>
</body>
</html>
