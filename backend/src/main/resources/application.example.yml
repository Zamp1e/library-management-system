server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/library?sslMode=DISABLED&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
    username: <YOUR_DB_USERNAME>
    password: <YOUR_DB_PASSWORD>
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
